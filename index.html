<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HENKKA | Digital Entity</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --neon-cyan: #00ffff;
            --neon-magenta: #ff00ff;
            --neon-green: #00ff41;
            --bg-deep: #000000;
        }

        body {
            font-family: 'Courier New', monospace;
            background: var(--bg-deep);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .content-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 2;
            width: 100%;
        }

        .main-text {
            font-size: clamp(1.5rem, 4vw, 3rem);
            color: var(--neon-cyan);
            text-shadow: 
                0 0 10px var(--neon-cyan),
                0 0 20px var(--neon-cyan),
                0 0 40px var(--neon-cyan);
            letter-spacing: 0.3em;
            margin-bottom: 1rem;
            opacity: 0;
            animation: fadeInOut 8s ease-in-out infinite;
        }

        .sub-text {
            font-size: clamp(0.7rem, 2vw, 1rem);
            color: var(--neon-magenta);
            text-shadow: 
                0 0 5px var(--neon-magenta),
                0 0 10px var(--neon-magenta);
            letter-spacing: 0.2em;
            opacity: 0;
            animation: fadeInOutSub 8s ease-in-out infinite;
        }

        @keyframes fadeInOut {
            0%, 10% { opacity: 0; transform: translateY(10px); }
            15%, 45% { opacity: 1; transform: translateY(0); }
            50%, 60% { opacity: 0; transform: translateY(-10px); }
            65%, 85% { opacity: 1; transform: translateY(0); }
            90%, 100% { opacity: 0; transform: translateY(10px); }
        }

        @keyframes fadeInOutSub {
            0%, 20% { opacity: 0; }
            30%, 50% { opacity: 1; }
            60%, 80% { opacity: 0; }
            90%, 100% { opacity: 0; }
        }

        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
            opacity: 0.3;
            animation: scanlineMove 8s ease-in-out infinite;
            z-index: 3;
        }

        @keyframes scanlineMove {
            0% { top: -10%; }
            100% { top: 110%; }
        }

        .corner-decoration {
            position: fixed;
            width: 100px;
            height: 100px;
            z-index: 2;
            pointer-events: none;
        }

        .corner-tl {
            top: 20px;
            left: 20px;
            border-left: 2px solid var(--neon-cyan);
            border-top: 2px solid var(--neon-cyan);
        }

        .corner-br {
            bottom: 20px;
            right: 20px;
            border-right: 2px solid var(--neon-magenta);
            border-bottom: 2px solid var(--neon-magenta);
        }

        .hud-text {
            position: fixed;
            font-size: 10px;
            color: rgba(0, 255, 255, 0.5);
            z-index: 2;
            letter-spacing: 0.1em;
        }

        .hud-tl {
            top: 30px;
            left: 30px;
        }

        .hud-br {
            bottom: 30px;
            right: 30px;
            text-align: right;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div class="scanline"></div>
    
    <div class="corner-decoration corner-tl"></div>
    <div class="corner-decoration corner-br"></div>

    <div class="hud-text hud-tl">
        SYSTEM: ONLINE<br>
        LOCATION: HELSINKI<br>
        STATUS: ACTIVE
    </div>

    <div class="content-overlay">
        <div class="main-text" id="mainText">HENKKA</div>
        <div class="sub-text" id="subText">INITIALIZING...</div>
    </div>

    <div class="hud-text hud-br">
        COORDINATES: 60.1699° N, 24.9384° E<br>
        TIMESTAMP: <span id="timestamp"></span>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.160.0';

        // Scene setup
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.002);

        const camera = new THREE.PerspectiveCamera(
            75,
            window.innerWidth / window.innerHeight,
            0.1,
            1000
        );
        camera.position.z = 1;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Create starfield particles
        const particleCount = 15000;
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);
        const sizes = new Float32Array(particleCount);

        for (let i = 0; i < particleCount; i++) {
            const i3 = i * 3;
            
            // Position - spread in a sphere
            const radius = 50 + Math.random() * 100;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            
            positions[i3] = radius * Math.sin(phi) * Math.cos(theta);
            positions[i3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
            positions[i3 + 2] = radius * Math.cos(phi);

            // Colors - cyan, magenta, white mix
            const colorType = Math.random();
            if (colorType < 0.4) {
                colors[i3] = 0; colors[i3+1] = 1; colors[i3+2] = 1; // Cyan
            } else if (colorType < 0.8) {
                colors[i3] = 1; colors[i3+1] = 0; colors[i3+2] = 1; // Magenta
            } else {
                colors[i3] = 1; colors[i3+1] = 1; colors[i3+2] = 1; // White
            }

            sizes[i] = Math.random() * 2;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

        // Custom shader material for particles
        const material = new THREE.ShaderMaterial({
            uniforms: {
                time: { value: 0 },
                pixelRatio: { value: renderer.getPixelRatio() }
            },
            vertexShader: `
                attribute float size;
                varying vec3 vColor;
                uniform float time;
                
                void main() {
                    vColor = color;
                    vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                    
                    // Wave effect
                    float wave = sin(mvPosition.z * 0.1 + time) * 2.0;
                    gl_Position = projectionMatrix * mvPosition;
                    gl_PointSize = size * (300.0 / -mvPosition.z) * pixelRatio;
                    gl_Position.xy += wave * 0.01;
                }
            `,
            fragmentShader: `
                varying vec3 vColor;
                
                void main() {
                    float strength = distance(gl_PointCoord, vec2(0.5));
                    strength = 1.0 - strength;
                    strength = pow(strength, 3.0);
                    gl_FragColor = vec4(vColor, strength * 0.8);
                }
            `,
            transparent: true,
            blending: THREE.AdditiveBlending
        });

        const particles = new THREE.Points(geometry, material);
        scene.add(particles);

        // Add grid lines for retro feel
        const gridGeometry = new THREE.PlaneGeometry(200, 200, 40, 40);
        const gridMaterial = new THREE.MeshBasicMaterial({
            color: 0x00ffff,
            wireframe: true,
            transparent: true,
            opacity: 0.1
        });
        const grid = new THREE.Mesh(gridGeometry, gridMaterial);
        grid.rotation.x = -Math.PI / 2;
        grid.position.z = -50;
        scene.add(grid);

        // Animation loop
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            
            time += 0.016;
            material.uniforms.time.value = time;

            // Rotate particles slowly
            particles.rotation.y = time * 0.05;
            particles.rotation.x = Math.sin(time * 0.1) * 0.1;

            // Move grid
            grid.position.z = -50 + Math.sin(time * 0.2) * 10;

            renderer.render(scene, camera);
        }
        animate();

        // Handle resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Text cycling
        const mainTexts = ['HENKKA', 'DESIGNER', 'DEVELOPER', 'CREATOR'];
        const subTexts = [
            'INITIALIZING SYSTEM...',
            'LOADING MODULES...',
            'ESTABLISHING CONNECTION...',
            'ACCESS GRANTED',
            'WELCOME USER'
        ];

        let mainIndex = 0;
        let subIndex = 0;

        setInterval(() => {
            document.getElementById('mainText').textContent = mainTexts[mainIndex];
            mainIndex = (mainIndex + 1) % mainTexts.length;
        }, 2000);

        setInterval(() => {
            document.getElementById('subText').textContent = subTexts[subIndex];
            subIndex = (subIndex + 1) % subTexts.length;
        }, 4000);

        // Update timestamp
        function updateTimestamp() {
            const now = new Date();
            document.getElementById('timestamp').textContent = 
                now.toISOString().replace('T', ' ').substring(0, 19) + ' UTC';
        }
        updateTimestamp();
        setInterval(updateTimestamp, 1000);
    </script>
</body>
</html>
