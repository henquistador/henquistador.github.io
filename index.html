<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Henkka | Digital Creator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #111111;
            --text-primary: #ffffff;
            --text-secondary: #888888;
            --accent-green: #00ff41;
            --accent-cyan: #00ffff;
        }

        body {
            font-family: 'Courier New', monospace;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .glitch-wrapper {
            position: relative;
            padding: 2rem;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .content {
            max-width: 800px;
            text-align: center;
        }

        h1 {
            font-size: clamp(2rem, 8vw, 6rem);
            margin-bottom: 1rem;
            position: relative;
            display: inline-block;
        }

        h1::before,
        h1::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        h1::before {
            animation: glitch-1 2s infinite linear alternate-reverse;
            color: var(--accent-green);
            clip-path: polygon(0 87%, 15% 87%, 15% 93%, 100% 93%, 100% 100%, 0 100%);
        }

        h1::after {
            animation: glitch-2 2s infinite linear alternate-reverse;
            color: var(--accent-cyan);
            clip-path: polygon(0 15%, 100% 15%, 100% 21%, 0 21%);
        }

        @keyframes glitch-1 {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }

        @keyframes glitch-2 {
            0% { transform: translate(0); }
            20% { transform: translate(2px, -2px); }
            40% { transform: translate(2px, 2px); }
            60% { transform: translate(-2px, -2px); }
            80% { transform: translate(-2px, 2px); }
            100% { transform: translate(0); }
        }

        .subtitle {
            font-size: clamp(0.9rem, 3vw, 1.2rem);
            color: var(--text-secondary);
            margin-bottom: 3rem;
            letter-spacing: 0.1em;
        }

        .links {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .link-btn {
            padding: 12px 24px;
            border: 1px solid var(--text-secondary);
            color: var(--text-primary);
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .link-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: left 0.5s ease;
        }

        .link-btn:hover {
            border-color: var(--accent-green);
            color: var(--accent-green);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.3);
        }

        .link-btn:hover::before {
            left: 100%;
        }

        .status {
            margin-top: 4rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--accent-green);
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.1),
                rgba(0, 0, 0, 0.1) 1px,
                transparent 1px,
                transparent 2px
            );
            z-index: 999;
        }
    </style>
</head>
<body>
    <div class="scanlines"></div>
    <div class="glitch-wrapper">
        <div class="content">
            <h1 data-text="HENKKA">HENKKA</h1>
            <p class="subtitle">GRAPHIC DESIGNER • PROGRAMMER • INDIE GAMEDev</p>
            
            <div class="links">
                <a href="https://github.com/henquistador" class="link-btn">GITHUB</a>
                <a href="mailto:henquistador@proton.me" class="link-btn">CONTACT</a>
                <a href="#" class="link-btn">PROJECTS</a>
            </div>

            <div class="status">
                <span class="status-dot"></span>ONLINE • HELLSINKI
            </div>
        </div>
    </div>
</body>
</html>
