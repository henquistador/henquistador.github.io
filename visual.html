<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Experience</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #000;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Scene Setup
        const scene = new THREE.Scene();
        
        // Camera
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 30;
        camera.position.y = 2;

        // Renderer with high quality settings
        const renderer = new THREE.WebGLRenderer({ 
            antialias: true,
            alpha: true 
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // Color palette
        const colors = {
            cyan: new THREE.Color(0x00ffff),
            blue: new THREE.Color(0x0088ff),
            purple: new THREE.Color(0x8844ff),
            white: new THREE.Color(0xffffff)
        };

        // Create flowing energy beam particles
        class EnergyBeam {
            constructor() {
                this.particles = [];
                this.numParticles = 15000;
                this.beamWidth = 8;
                this.beamLength = 60;
                
                const geometry = new THREE.BufferGeometry();
                const positions = new Float32Array(this.numParticles * 3);
                const colorsArr = new Float32Array(this.numParticles * 3);
                const sizes = new Float32Array(this.numParticles);
                
                for (let i = 0; i < this.numParticles; i++) {
                    // Distribute particles along the beam
                    const t = Math.random();
                    positions[i * 3] = (t - 0.5) * this.beamLength;
                    positions[i * 3 + 1] = (Math.random() - 0.5) * this.beamWidth;
                    positions[i * 3 + 2] = (Math.random() - 0.5) * this.beamWidth;
                    
                    // Color gradient from white to cyan
                    const colorMix = colors.cyan.clone().lerp(colors.white, t);
                    colorsArr[i * 3] = colorMix.r;
                    colorsArr[i * 3 + 1] = colorMix.g;
                    colorsArr[i * 3 + 2] = colorMix.b;
                    
                    sizes[i] = Math.random() * 0.15 + 0.05;
                }
                
                geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                geometry.setAttribute('color', new THREE.BufferAttribute(colorsArr, 3));
                geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
                
                // Custom shader material for glowing particles
                this.material = new THREE.ShaderMaterial({
                    uniforms: {
                        time: { value: 0 },
                        pixelRatio: { value: renderer.getPixelRatio() }
                    },
                    vertexShader: `
                        uniform float time;
                        attribute float size;
                        varying vec3 vColor;
                        
                        void main() {
                            vColor = color;
                            vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                            gl_PointSize = size * (300.0 / -mvPosition.z) * pixelRatio;
                            gl_Position = projectionMatrix * mvPosition;
                        }
                    `,
                    fragmentShader: `
                        varying vec3 vColor;
                        
                        void main() {
                            float strength = distance(gl_PointCoord, vec2(0.5));
                            strength = 1.0 - strength;
                            strength = pow(strength, 3.0);
                            gl_FragColor = vec4(vColor, strength * 0.8);
                        }
                    `,
                    blending: THREE.AdditiveBlending,
                    depthWrite: false,
                    transparent: true
                });
                
                this.particleSystem = new THREE.Points(geometry, this.material);
                scene.add(this.particleSystem);
            }
            
            update(time) {
                this.material.uniforms.time.value = time;
                
                const positions = this.particleSystem.geometry.attributes.position.array;
                for (let i = 0; i < this.numParticles; i++) {
                    // Flow effect - particles move along X axis
                    positions[i * 3] += 0.02;
                    if (positions[i * 3] > this.beamLength / 2) {
                        positions[i * 3] = -this.beamLength / 2;
                    }
                    
                    // Add wave motion
                    const t = (time + positions[i * 3]) * 0.5;
                    positions[i * 3 + 1] += Math.sin(t) * 0.01;
                    positions[i * 3 + 2] += Math.cos(t * 0.7) * 0.01;
                }
                this.particleSystem.geometry.attributes.position.needsUpdate = true;
            }
        }

        // Create volumetric cloud formations
        class VolumetricCloud {
            constructor(x, y, z, scale) {
                this.scale = scale;
                const particleCount = 8000;
                
                const geometry = new THREE.BufferGeometry();
                const positions = new Float32Array(particleCount * 3);
                const colorsArr = new Float32Array(particleCount * 3);
                
                for (let i = 0; i < particleCount; i++) {
                    // Create organic cloud shape
                    const theta = Math.random() * Math.PI * 2;
                    const phi = Math.acos(2 * Math.random() - 1);
                    const r = scale * Math.cbrt(Math.random());
                    
                    positions[i * 3] = x + r * Math.sin(phi) * Math.cos(theta);
                    positions[i * 3 + 1] = y + r * Math.sin(phi) * Math.sin(theta);
                    positions[i * 3 + 2] = z + r * Math.cos(phi);
                    
                    // Soft blue-white colors
                    const colorMix = colors.blue.clone().lerp(colors.white, Math.random());
                    colorsArr[i * 3] = colorMix.r;
                    colorsArr[i * 3 + 1] = colorMix.g;
                    colorsArr[i * 3 + 2] = colorMix.b;
                }
                
                geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                geometry.setAttribute('color', new THREE.BufferAttribute(colorsArr, 3));
                
                this.material = new THREE.PointsMaterial({
                    size: 0.1 * scale,
                    vertexColors: true,
                    transparent: true,
                    opacity: 0.6,
                    blending: THREE.AdditiveBlending
                });
                
                this.cloud = new THREE.Points(geometry, this.material);
                scene.add(this.cloud);
            }
            
            update(time) {
                this.cloud.rotation.y += 0.001;
                this.cloud.rotation.x = Math.sin(time * 0.5) * 0.1;
            }
        }

        // Create connecting lines between nodes
        class NeuralNetwork {
            constructor() {
                this.nodes = [];
                this.connections = [];
                const numNodes = 80;
                
                // Create nodes
                for (let i = 0; i < numNodes; i++) {
                    const nodeGeometry = new THREE.SphereGeometry(0.15, 8, 8);
                    const nodeMaterial = new THREE.MeshBasicMaterial({
                        color: colors.cyan,
                        transparent: true,
                        opacity: 0.9
                    });
                    const node = new THREE.Mesh(nodeGeometry, nodeMaterial);
                    
                    node.position.x = (Math.random() - 0.5) * 40;
                    node.position.y = (Math.random() - 0.5) * 15;
                    node.position.z = (Math.random() - 0.5) * 10;
                    
                    scene.add(node);
                    this.nodes.push({ mesh: node, basePos: node.position.clone() });
                }
                
                // Create connections
                for (let i = 0; i < numNodes; i++) {
                    for (let j = i + 1; j < numNodes; j++) {
                        const dist = this.nodes[i].basePos.distanceTo(this.nodes[j].basePos);
                        if (dist < 8) {
                            const lineGeometry = new THREE.BufferGeometry().setFromPoints([
                                this.nodes[i].basePos,
                                this.nodes[j].basePos
                            ]);
                            const lineMaterial = new THREE.LineBasicMaterial({
                                color: colors.cyan,
                                transparent: true,
                                opacity: 0.15
                            });
                            const line = new THREE.Line(lineGeometry, lineMaterial);
                            scene.add(line);
                            this.connections.push({
                                line: line,
                                nodeA: i,
                                nodeB: j
                            });
                        }
                    }
                }
            }
            
            update(time) {
                // Animate nodes with wave motion
                this.nodes.forEach((node, i) => {
                    node.mesh.position.y = node.basePos.y + Math.sin(time * 2 + i) * 0.5;
                    node.mesh.rotation.x += 0.01;
                    node.mesh.rotation.y += 0.01;
                });
            }
        }

        // Create glowing orbs
        class GlowingOrb {
            constructor(x, y, z, radius, color) {
                const segments = 64;
                this.geometry = new THREE.SphereGeometry(radius, segments, segments);
                
                this.material = new THREE.ShaderMaterial({
                    uniforms: {
                        time: { value: 0 },
                        baseColor: { value: color }
                    },
                    vertexShader: `
                        uniform float time;
                        varying vec3 vNormal;
                        
                        void main() {
                            vNormal = normal;
                            vec3 pos = position;
                            pos += normal * sin(time * 2.0 + length(position) * 0.5) * 0.1;
                            gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
                        }
                    `,
                    fragmentShader: `
                        uniform vec3 baseColor;
                        varying vec3 vNormal;
                        
                        void main() {
                            float intensity = pow(0.7 - dot(vNormal, vec3(0, 0, 1)), 2.0);
                            gl_FragColor = vec4(baseColor * 1.5 + vec3(intensity), 1.0);
                        }
                    `,
                    blending: THREE.AdditiveBlending,
                    side: THREE.FrontSide
                });
                
                this.orb = new THREE.Mesh(this.geometry, this.material);
                this.orb.position.set(x, y, z);
                scene.add(this.orb);
            }
            
            update(time) {
                this.material.uniforms.time.value = time;
                this.orb.rotation.y += 0.002;
            }
        }

        // Create light beams/rays
        class LightBeam {
            constructor() {
                this.beams = [];
                const numBeams = 15;
                
                for (let i = 0; i < numBeams; i++) {
                    const beamLength = 30 + Math.random() * 20;
                    const geometry = new THREE.BufferGeometry();
                    const positions = new Float32Array(6);
                    positions[1] = -beamLength / 2;
                    positions[4] = beamLength / 2;
                    geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
                    
                    const material = new THREE.LineBasicMaterial({
                        color: colors.cyan,
                        transparent: true,
                        opacity: 0.3
                    });
                    
                    const beam = new THREE.Line(geometry, material);
                    beam.position.x = (Math.random() - 0.5) * 20;
                    beam.position.y = (Math.random() - 0.5) * 10;
                    beam.rotation.z = (Math.random() - 0.5) * 0.3;
                    
                    scene.add(beam);
                    this.beams.push({
                        mesh: beam,
                        speed: 0.5 + Math.random() * 1,
                        offset: Math.random() * Math.PI * 2
                    });
                }
            }
            
            update(time) {
                this.beams.forEach(beam => {
                    beam.mesh.position.y += Math.sin(time * beam.speed + beam.offset) * 0.01;
                });
            }
        }

        // Initialize all visual elements
        const energyBeam = new EnergyBeam();
        const neuralNetwork = new NeuralNetwork();
        
        // Add volumetric clouds at different positions
        const cloud1 = new VolumetricCloud(-20, 0, -5, 4);
        const cloud2 = new VolumetricCloud(20, 3, -8, 3);
        const cloud3 = new VolumetricCloud(-15, -4, -3, 2.5);
        
        // Add glowing orbs
        const orb1 = new GlowingOrb(-25, 0, 0, 1.5, colors.cyan);
        const orb2 = new GlowingOrb(25, 2, -2, 1, colors.purple);
        
        // Add light beams
        const lightBeams = new LightBeam();

        // Ambient particles
        const ambientGeometry = new THREE.BufferGeometry();
        const ambientCount = 500;
        const ambientPositions = new Float32Array(ambientCount * 3);
        for (let i = 0; i < ambientCount * 3; i++) {
            ambientPositions[i] = (Math.random() - 0.5) * 100;
        }
        ambientGeometry.setAttribute('position', new THREE.BufferAttribute(ambientPositions, 3));
        const ambientMaterial = new THREE.PointsMaterial({
            size: 0.1,
            color: colors.white,
            transparent: true,
            opacity: 0.5
        });
        const ambientParticles = new THREE.Points(ambientGeometry, ambientMaterial);
        scene.add(ambientParticles);

        // Mouse interaction
        let mouseX = 0;
        let mouseY = 0;
        document.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX - window.innerWidth / 2) * 0.01;
            mouseY = (e.clientY - window.innerHeight / 2) * 0.01;
        });

        // Animation loop
        function animate(time) {
            requestAnimationFrame(animate);
            
            const timeSec = time * 0.001;
            
            // Update all elements
            energyBeam.update(timeSec);
            neuralNetwork.update(timeSec);
            cloud1.update(timeSec);
            cloud2.update(timeSec);
            cloud3.update(timeSec);
            orb1.update(timeSec);
            orb2.update(timeSec);
            lightBeams.update(timeSec);
            
            // Camera movement based on mouse
            camera.position.x += (mouseX * 5 - camera.position.x) * 0.05;
            camera.position.y += (-mouseY * 3 + 2 - camera.position.y) * 0.05;
            camera.lookAt(0, 0, 0);
            
            // Subtle ambient particle rotation
            ambient
